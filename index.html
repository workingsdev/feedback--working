<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Feedback</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: rgb(170, 170, 170);
            margin: 0px;
        }

        header {
            background-color: #003366;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 15px;
            font-family: sans-serif;
        }

        main {
            width: 400px;
            margin: 30px auto;
            background: rgb(255, 255, 255);
            padding: 100px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 83, 4, 0);
        }

        h2 {
            text-align: center;
            font-family: 'Franklin Gothic Medium', sans-serif;
            font-weight: 300px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            font-family: 'Courier New', Courier, monospace;
            color: rgb(0, 0, 0);
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border:none;
        }

        textarea {
            height: 80px;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #003366;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            transition: 0.3s;
            background-color: #496770b9;
        }

        select {
            width: 100%;
            margin-top: 15px;
            padding: 8px;
        }

        #res {
            margin-top: 10px;
            text-align: center;
            color: green;
            font-weight: bold;
        }

        /* ⭐ estrelas (SEU CSS) */
        .radio {
          display: flex;
          justify-content: center;
          gap: 10px;
          margin-top: 10px;
        }

        .radio > input {
          position: absolute;
          appearance: none;
        }

        .radio > label {
          cursor: pointer;
          font-size: 30px;
          position: relative;
          display: inline-block;
          transition: transform 0.3s ease;
        }

        .radio > label > svg {
          fill: #666;
          transition: fill 0.3s ease;
        }

        .radio > label::before,
        .radio > label::after {
          content: "";
          position: absolute;
          width: 6px;
          height: 6px;
          background-color: #ff9e0b;
          border-radius: 50%;
          opacity: 0;
          transform: scale(0);
          transition: transform 0.4s ease, opacity 0.4s ease;
          animation: particle-explosion 1s ease-out;
        }

        .radio > label::before {
          top: -15px;
          left: 50%;
          transform: translateX(-50%) scale(0);
        }

        .radio > label::after {
          bottom: -15px;
          left: 50%;
          transform: translateX(-50%) scale(0);
        }

        .radio > label:hover::before,
        .radio > label:hover::after {
          opacity: 1;
          transform: translateX(-50%) scale(1.5);
        }

        .radio > label:hover {
          transform: scale(1.2);
          animation: pulse 0.6s infinite alternate;
        }

        .radio > label:hover > svg {
          fill: #ff9e0b;
          filter: drop-shadow(0 0 15px rgba(255, 158, 11, 0.9));
          animation: shimmer 1s ease infinite alternate;
        }

        .radio > input:checked + label > svg {
          fill: #ff9e0b;
          filter: drop-shadow(0 0 15px rgba(255, 158, 11, 0.9));
          animation: pulse 0.8s infinite alternate;
        }

        .radio > input:checked + label ~ label > svg,
        .radio > input:checked + label > svg {
          fill: #ff9e0b;
        }

        @keyframes pulse {
          0% { transform: scale(1); }
          100% { transform: scale(1.1); }
        }

        @keyframes particle-explosion {
          0% { opacity: 0; transform: scale(0.5); }
          50% { opacity: 1; transform: scale(1.2); }
          100% { opacity: 0; transform: scale(0.5); }
        }

        @keyframes shimmer {
          0% { filter: drop-shadow(0 0 10px rgba(255, 158, 11, 0.5)); }
          100% { filter: drop-shadow(0 0 20px rgba(255, 158, 11, 1)); }
        }
    </style>
</head>

<body>

<header>
    <h1>Sistema de Feedback</h1>
</header>

<main>
    <h2>Envie seu feedback</h2>

    <label></label>
    <input type="text" id="fname" placeholder="Digite seu nome completo">

    <label></label>
    <textarea id="ftext" placeholder="Nos dê seu feedback"></textarea>

    <label>Avaliação:</label>

  <input value="5" name="rating" type="radio" id="rating-5" />

        d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"
      ></path>
    </svg>
  </label>
</div>


    <button onclick="Enviar()">Enviar</button>

    <select id="flista" size="6"></select>

    <div id="res"></div>
</main>

<script>
function Enviar() {
    let name = document.getElementById('fname')
    let description = document.getElementById('ftext')
    let flista = document.getElementById('flista')
    let res = document.getElementById('res')

    let rating = document.querySelector('input[name="rating"]:checked')

    if (name.value.trim() === "" || description.value.trim() === "" || !rating) {
        alert("Preencha todos os campos e a avaliação!")
        return
    }

    let feedback = `${name.value} - ${description.value} (${rating.value}⭐)`

    let item = document.createElement("option")
    item.text = feedback
    flista.appendChild(item)

    res.innerHTML = "Feedback cadastrado com sucesso."

    // reset
    name.value = ""
    description.value = ""
    rating.checked = false
}
</script>

</body>
</html>
